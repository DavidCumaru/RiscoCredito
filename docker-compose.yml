services:
  ollama:
    image: ollama/ollama:latest
    container_name: riscocredito-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riscocredito-api
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - DATABASE_URL=sqlite:///credit_risk.db
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - api_data:/app/artifacts
      - api_db:/app

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: riscocredito-streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  ollama_data:
  api_data:
  api_db:
